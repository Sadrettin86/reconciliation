<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSM Giriş — keharita.app</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8f4fd 100%);
    }
    .box {
      background: white; border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      padding: 40px 48px; text-align: center; max-width: 420px; width: 90%;
    }
    .spinner {
      display: inline-block; width: 36px; height: 36px;
      border: 4px solid #f3f3f3; border-top: 4px solid #e67e22;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { margin: 0 0 8px; color: #2c3e50; font-size: 18px; }
    p  { margin: 0; color: #7f8c8d; font-size: 14px; }
    .error   { color: #e74c3c; }
    .success { color: #27ae60; }
    .icon    { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="box" id="box">
  <div class="spinner"></div>
  <h2>OSM girişi tamamlanıyor…</h2>
  <p>Lütfen bekleyin, yönlendiriliyorsunuz.</p>
</div>

<script>
(async () => {
  const box    = document.getElementById('box');
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const state  = params.get('state');
  const error  = params.get('error');

  function showError(msg) {
    box.innerHTML = `
      <div class="icon">❌</div>
      <h2 class="error">Giriş başarısız</h2>
      <p>${msg}</p>`;
  }

  function showSuccess(username) {
    box.innerHTML = `
      <div class="icon">✅</div>
      <h2 class="success">Hoş geldiniz, ${username}!</h2>
      <p>Ana sayfaya yönlendiriliyorsunuz…</p>`;
  }

  // OSM erişimi reddedildiyse
  if (error) {
    showError(`OSM erişim izni verilmedi: ${error}`);
    return;
  }

  if (!code) {
    showError('Yetkilendirme kodu alınamadı.');
    return;
  }

  // State doğrula (CSRF koruması)
  const savedState = localStorage.getItem('osm_state');
  if (!savedState || savedState !== state) {
    showError('Güvenlik doğrulaması başarısız (state uyuşmazlığı). Lütfen tekrar deneyin.');
    localStorage.removeItem('osm_state');
    localStorage.removeItem('osm_code_verifier');
    return;
  }

  // Token exchange
  try {
    const verifier   = localStorage.getItem('osm_code_verifier');
    const CLIENT_ID  = 'fjnwUVmRp5E_NC4abf7IsW2nSInyPIIIuII8j9UXdQ';
    const PROXY_BASE = 'https://keharita.toolforge.org';
    const REDIRECT   = 'https://keharita.app/osm-callback';

    // State'i temizle
    localStorage.removeItem('osm_state');
    localStorage.removeItem('osm_code_verifier');

    const res = await fetch(`${PROXY_BASE}/osm-token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        code,
        code_verifier: verifier,
        redirect_uri:  REDIRECT,
        client_id:     CLIENT_ID,
      }),
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText);
    }

    const data = await res.json();

    // Kullanıcı profilini çek
    const profileRes = await fetch(
      'https://api.openstreetmap.org/api/0.6/user/details.json',
      { headers: { Authorization: `Bearer ${data.access_token}` } }
    );

    if (!profileRes.ok) throw new Error('Kullanıcı bilgisi alınamadı.');
    const profileData = await profileRes.json();
    const profile     = profileData.user;

    // Kullanıcıyı kaydet
    const osmUser = {
      username:    profile.display_name,
      userId:      String(profile.id),
      accessToken: data.access_token,
      loggedInAt:  Date.now(),
    };
    localStorage.setItem('osm_user', JSON.stringify(osmUser));

    showSuccess(profile.display_name);

    // 1.5 saniye sonra ana sayfaya dön
    setTimeout(() => { window.location.href = '/'; }, 1500);

  } catch (e) {
    showError(`Token alınamadı: ${e.message}`);
  }
})();
</script>
</body>
</html>
